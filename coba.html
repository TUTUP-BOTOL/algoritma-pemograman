<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body>
    <div class="w-full h-[200px] bg-yellow-400">

        cook cok
    </div>
    <button id="bar-btn" class="lg:hidden fixed top-4 left-4 z-50 bg-[#FAD06C] px-4 py-2 rounded-lg">
        ☰ Menu
    </button>
    <div class="lg:hidden">
        <div id="sidebar" class="w-[250px] h-screen bg-[#FAD06C]
                flex flex-col
                text-[#293241] text-[20px] font-medium font1  transform -translate-x-full transition-transform duration-300 z-40
                fixed top-0 left-0 z-50">
            <button id="close-btn" class="text-right p-4 text-2xl">
                ✕
            </button>

            <a data-page="home.html" class="nav-btn p-4 md:p-7">Beranda</a>
            <a data-page="tugas1.html" class="nav-btn p-4 md:p-7">Looping</a>
            <a data-page="tugas2.html" class="nav-btn p-4 md:p-7">Array</a>
            <a data-page="thesis.html" class="nav-btn p-4 md:p-7">Praktikum Akhir</a>

        </div>
    </div>

    <script>
        const barBtn = document.getElementById('bar-btn');
        const closeBtn = document.getElementById('close-bar');
        const sidebar = document.getElementById('sidebar');

        barBtn.addEventListener('click', () => {
            sidebar.classList.remove('-translate-x-full');
        });

        closeBtn.addEventListener('click', () => {
            sidebar.classList.add('-translate-x-full');
        });

        document.querySelectorAll('#sidebar a').forEach(link => {
            link.addEventListener('click', () => {
                sidebar.classList.add('-translate-x-full');
            });
        });
    </script>
</body>

</html>
